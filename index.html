    <!-- === FONT === -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- === STYLES === -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a1a0f;
            color: #e8f5ec;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* === SCROLL-ANIMATIONS === */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        .reveal-left {
            opacity: 0;
            transform: translateX(-40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal-left.visible { opacity: 1; transform: translateX(0); }

        .reveal-right {
            opacity: 0;
            transform: translateX(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal-right.visible { opacity: 1; transform: translateX(0); }

        /* === NAVBAR === */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 60px;
            position: sticky;
            top: 0;
            background: rgba(10, 26, 15, 0.85);
            backdrop-filter: blur(14px);
            z-index: 999;
            border-bottom: 1px solid rgba(134, 239, 172, 0.08);
        }
        .logo-wrap { display: flex; align-items: center; gap: 10px; }
        .logo-svg { width: 36px; height: 36px; }
        .logo-text {
            font-weight: 900;
            font-size: 22px;
            background: linear-gradient(90deg, #86efac, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .logo-sub {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: block;
            margin-top: 2px;
        }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a {
            text-decoration: none;
            color: #cbd5e1;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }
        nav a:hover { color: #86efac; }

        /* === HERO === */
        .hero {
            text-align: center;
            padding: 100px 20px 60px;
            background:
                radial-gradient(ellipse at top, rgba(34, 211, 238, 0.15), transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(74, 222, 128, 0.25), transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(134, 239, 172, 0.18), transparent 60%);
            position: relative;
            overflow: hidden;
        }
        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 999px;
            border: 1px solid rgba(134, 239, 172, 0.3);
            background: rgba(74, 222, 128, 0.08);
            color: #86efac;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .hero h1 {
            font-size: 76px;
            font-weight: 900;
            background: linear-gradient(90deg, #ffffff 0%, #86efac 60%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            line-height: 1.05;
            letter-spacing: -2px;
        }
        .hero h1 .underline { position: relative; display: inline-block; }
        .hero h1 .underline::after {
            content: '';
            position: absolute;
            bottom: 4px; left: 0;
            width: 100%; height: 8px;
            background: linear-gradient(90deg, #4ade80, #22d3ee);
            opacity: 0.3;
            border-radius: 4px;
            z-index: -1;
        }
        .hero p.subtitle {
            font-size: 22px;
            color: #a7f3d0;
            max-width: 720px;
            margin: 0 auto 16px;
            font-weight: 500;
        }
        .hero p.subtext {
            font-size: 17px;
            color: #94a3b8;
            max-width: 640px;
            margin: 0 auto 40px;
        }

        /* === BUTTONS === */
        .btn {
            display: inline-block;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            margin: 6px;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(90deg, #22c55e, #10b981);
            color: #0a1a0f;
            box-shadow: 0 10px 40px rgba(34, 197, 94, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 50px rgba(34, 197, 94, 0.6);
        }
        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.06);
            border-color: #86efac;
        }

        /* === ROBOT SCENE === */
        .scene {
            position: relative;
            max-width: 900px;
            margin: 60px auto 20px;
            height: 200px;
            background: linear-gradient(180deg, transparent 60%, rgba(74, 222, 128, 0.08) 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(134, 239, 172, 0.1);
        }
        .ground {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 30px;
            background: linear-gradient(180deg, rgba(74, 222, 128, 0.15), rgba(34, 197, 94, 0.4));
            border-top: 2px solid rgba(134, 239, 172, 0.3);
        }
        .grass {
            position: absolute;
            bottom: 25px;
            width: 4px; height: 12px;
            background: #4ade80;
            border-radius: 2px;
        }
        .tree { position: absolute; bottom: 28px; font-size: 38px; }
        .flower {
            position: absolute;
            bottom: 30px;
            font-size: 20px;
            animation: sway 3s ease-in-out infinite;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        .sun {
            position: absolute;
            top: 20px; right: 40px;
            font-size: 44px;
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .cloud {
            position: absolute;
            top: 30px;
            font-size: 32px;
            opacity: 0.8;
            animation: drift 15s linear infinite;
        }
        @keyframes drift {
            from { left: -10%; }
            to { left: 110%; }
        }
        .robot {
            position: absolute;
            bottom: 30px;
            width: 70px; height: 60px;
            animation: drive 12s linear infinite;
        }
        @keyframes drive {
            0% { left: -10%; transform: scaleX(1); }
            45% { left: 95%; transform: scaleX(1); }
            50% { left: 95%; transform: scaleX(-1); }
            95% { left: -10%; transform: scaleX(-1); }
            100% { left: -10%; transform: scaleX(1); }
        }
        .robot-body {
            position: absolute;
            bottom: 12px; left: 5px;
            width: 60px; height: 32px;
            background: linear-gradient(180deg, #4ade80, #22c55e);
            border-radius: 14px 14px 6px 6px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.5);
        }
        .robot-eye {
            position: absolute;
            top: 8px;
            width: 10px; height: 10px;
            background: #0a1a0f;
            border-radius: 50%;
            border: 2px solid #86efac;
            animation: blink 3s infinite;
        }
        .robot-eye.left { left: 12px; }
        .robot-eye.right { right: 12px; }
        @keyframes blink {
            0%, 95%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        .robot-antenna {
            position: absolute;
            top: -10px; left: 50%;
            transform: translateX(-50%);
            width: 2px; height: 12px;
            background: #86efac;
        }
        .robot-antenna::after {
            content: '';
            position: absolute;
            top: -6px; left: -3px;
            width: 8px; height: 8px;
            background: #22d3ee;
            border-radius: 50%;
            box-shadow: 0 0 10px #22d3ee;
            animation: signal 1.2s ease-in-out infinite;
        }
        @keyframes signal {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        .robot-wheel {
            position: absolute;
            bottom: 0;
            width: 14px; height: 14px;
            background: #1f2937;
            border-radius: 50%;
            border: 2px solid #4ade80;
            animation: spin 0.5s linear infinite;
        }
        .robot-wheel.left { left: 8px; }
        .robot-wheel.right { right: 8px; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .scan-beam {
            position: absolute;
            bottom: 12px; left: 30px;
            width: 12px; height: 30px;
            background: linear-gradient(180deg, rgba(34, 211, 238, 0.6), transparent);
            transform-origin: top;
            animation: scan 2s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { transform: rotate(-15deg); opacity: 0.8; }
            50% { transform: rotate(15deg); opacity: 0.4; }
        }

        /* === STATS === */
        .stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 60px;
            flex-wrap: wrap;
        }
        .stat { text-align: center; }
        .stat-number {
            font-size: 40px;
            font-weight: 900;
            color: #86efac;
            display: inline-block;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 6px;
        }

        /* === SECTIONS === */
        section {
            padding: 120px 60px;
            max-width: 1280px;
            margin: 0 auto;
        }
        .section-tag {
            text-align: center;
            color: #4ade80;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .section-title {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #f1f5f9;
            letter-spacing: -1px;
        }
        .section-subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 18px;
            max-width: 650px;
            margin: 0 auto 70px;
        }

        /* === LEVELS === */
        .levels { display: grid; gap: 20px; }
        .level {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            align-items: center;
            gap: 30px;
            padding: 28px 32px;
            background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border: 1px solid rgba(134, 239, 172, 0.1);
            border-radius: 16px;
            transition: 0.3s;
        }
        .level:hover {
            transform: translateX(8px);
            border-color: rgba(134, 239, 172, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .level-num {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .level-content h3 { font-size: 22px; color: #fff; margin-bottom: 6px; }
        .level-content p { color: #94a3b8; font-size: 15px; }
        .level-tag {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .level-tag.now { background: rgba(148,163,184,0.15); color: #cbd5e1; }
        .level-tag.soon { background: rgba(96,165,250,0.15); color: #60a5fa; }
        .level-tag.future { background: rgba(167,139,250,0.15); color: #a78bfa; }
        .level-tag.vision { background: rgba(34,211,238,0.15); color: #22d3ee; }

        /* === ROADMAP === */
        .roadmap { position: relative; padding: 40px 0; }
        .roadmap::before {
            content: '';
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #4ade80, #22d3ee, #a78bfa);
            transform: translateX(-50%);
            border-radius: 3px;
        }
        .milestone {
            display: grid;
            grid-template-columns: 1fr 80px 1fr;
            align-items: center;
            gap: 30px;
            margin-bottom: 50px;
            position: relative;
        }
        .milestone-dot {
            width: 22px; height: 22px;
            background: #0a1a0f;
            border: 4px solid #4ade80;
            border-radius: 50%;
            justify-self: center;
            z-index: 2;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.6);
        }
        .milestone-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(134, 239, 172, 0.15);
            border-radius: 14px;
            padding: 24px;
            transition: 0.3s;
        }
        .milestone-card:hover {
            transform: scale(1.03);
            border-color: rgba(134, 239, 172, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .milestone-year {
            font-size: 14px;
            font-weight: 800;
            color: #4ade80;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .milestone-card h3 { font-size: 19px; color: #fff; margin-bottom: 8px; }
        .milestone-card p { color: #94a3b8; font-size: 14px; }
        .milestone.right .milestone-card { grid-column: 3; }
        .milestone.left .milestone-card { grid-column: 1; text-align: right; }

        /* === FEATURES === */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .feature {
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 32px;
            transition: 0.3s;
        }
        .feature:hover {
            transform: translateY(-8px);
            border-color: rgba(134, 239, 172, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .feature .emoji { font-size: 42px; margin-bottom: 16px; display: block; }
        .feature h3 { font-size: 20px; color: #fff; margin-bottom: 10px; }
        .feature p { color: #94a3b8; font-size: 15px; }

        /* === VISION === */
        .vision {
            text-align: center;
            background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(34,211,238,0.08));
            border: 1px solid rgba(134, 239, 172, 0.15);
            border-radius: 28px;
            padding: 80px 40px;
            margin: 80px 60px;
        }
        .vision h2 { font-size: 44px; margin-bottom: 24px; color: #fff; }
        .vision p {
            color: #cbd5e1;
            font-size: 18px;
            max-width: 700px;
            margin: 0 auto 30px;
        }

        /* === FOOTER === */
        footer {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
            font-size: 14px;
            border-top: 1px solid rgba(134, 239, 172, 0.06);
        }
        footer .logo-wrap { justify-content: center; margin-bottom: 12px; }
        footer a { color: #86efac; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* === SCROLL-TO-TOP BUTTON === */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #22c55e, #10b981);
            color: #0a1a0f;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 998;
        }
        .scroll-top.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .scroll-top:hover { transform: translateY(-4px); }

        /* === COOKIE BANNER === */
        .cookie-banner {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(10, 26, 15, 0.98);
            border: 1px solid rgba(134, 239, 172, 0.3);
            border-radius: 16px;
            padding: 24px;
            color: #e8f5ec;
            font-size: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 9999;
            backdrop-filter: blur(20px);
            display: none;
            line-height: 1.5;
        }
        .cookie-banner.show { display: block; }
        .cookie-banner h4 { color: #86efac; margin-bottom: 8px; font-size: 16px; }
        .cookie-banner p { margin-bottom: 16px; color: #cbd5e1; }
        .cookie-banner .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .cookie-banner button {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .cookie-banner .accept {
            background: linear-gradient(90deg, #22c55e, #10b981);
            color: #0a1a0f;
        }
        .cookie-banner .decline {
            background: transparent;
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .hero h1 { font-size: 44px; }
            .hero p.subtitle { font-size: 17px; }
            section { padding: 70px 20px; }
            nav { padding: 16px 20px; }
            nav ul { display: none; }
            .level { grid-template-columns: 60px 1fr; }
            .level-num { font-size: 48px; }
            .level-tag { grid-column: 2; justify-self: start; }
            .stats { gap: 30px; }
            .stat-number { font-size: 30px; }
            .vision { margin: 40px 20px; padding: 50px 20px; }
            .vision h2 { font-size: 32px; }
            .scene { height: 160px; margin: 40px auto 10px; }
            .roadmap::before { left: 20px; }
            .milestone { grid-template-columns: 50px 1fr; gap: 16px; }
            .milestone-dot { grid-column: 1; }
            .milestone.right .milestone-card,
            .milestone.left .milestone-card { grid-column: 2; text-align: left; }
            .scroll-top { bottom: 20px; right: 20px; width: 44px; height: 44px; font-size: 20px; }
        }
